name: codegraph
description: >-
  Analyzer-built code graph + query CLI so AI agents can navigate a
  Flutter/Riverpod codebase without grepping. Ships an `init` command that
  installs the agent trigger layer (CLAUDE.md block, session hook, skill).
version: 0.9.7
homepage: https://github.com/ArinFaraj/codegraph
repository: https://github.com/ArinFaraj/codegraph
issue_tracker: https://github.com/ArinFaraj/codegraph/issues
publish_to: none

environment:
  sdk: ^3.5.0

executables:
  codegraph:

dependencies:
  analyzer: ^12.0.0

dev_dependencies:
  test: ^1.25.0
